<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent JSON Generator</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 800px; margin: 20px auto; padding: 0 20px; background: #f5f5f7; color: #333; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h2 { margin-top: 0; color: #1d1d1f; border-bottom: 2px solid #f0f0f2; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        input[type="text"], input[type="number"], textarea, select { width: 100%; padding: 10px; border: 1px solid #d2d2d7; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        textarea { height: 60px; resize: vertical; }
        .row { display: flex; gap: 15px; }
        .row .form-group { flex: 1; }
        button { background: #0071e3; color: white; border: none; padding: 12px 20px; border-radius: 6px; font-size: 15px; cursor: pointer; font-weight: 500; width: 100%; }
        button:hover { background: #0077ed; }
        pre { background: #1e1e1e; color: #d4d4d4; padding: 15px; border-radius: 8px; overflow-x: auto; font-family: "SFMono-Regular", Consolas, Monaco, monospace; font-size: 13px; }
        .copy-btn { background: #34c759; margin-top: 10px; }
        .copy-btn:hover { background: #30b753; }
        .back-link { display: inline-block; margin-bottom: 20px; color: #0071e3; text-decoration: none; font-size: 14px; }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

<a href="index.html" class="back-link">&larr; ツール一覧に戻る</a>

<div class="card">
    <h2>AIモデル / CLI データ追加フォーム</h2>
    <form id="agentForm">
        <div class="row">
            <div class="form-group"><label>ID (小文字英数字・ハイフン)</label><input type="text" id="agentId" placeholder="gemini-3-5-flash" required></div>
            <div class="form-group"><label>モデル・ツール名</label><input type="text" id="name" placeholder="Gemini 3.5 Flash" required></div>
        </div>
        <div class="row">
            <div class="form-group"><label>インターフェース</label><input type="text" id="interface" placeholder="cli / api" required></div>
            <div class="form-group"><label>カテゴリ</label><input type="text" id="category" placeholder="Fast Utility / Large Context" required></div>
        </div>
        <div class="form-group"><label>URL</label><input type="text" id="url" placeholder="https://aistudio.google.com" required></div>

        <h3 style="font-size:15px; margin-top:20px;">【料金設定 (Billing)】</h3>
        <div class="row">
            <div class="form-group"><label>料金タイプ</label><input type="text" id="billingType" placeholder="Pay-as-you-go" required></div>
            <div class="form-group"><label>ベースプラン</label><input type="text" id="basePlan" placeholder="従量課金 / 無料枠あり" required></div>
        </div>
        <div class="row">
            <div class="form-group"><label>1Mトークン単価 (入力 $)</label><input type="number" id="apiInput" step="0.0001" placeholder="0.075" required></div>
            <div class="form-group"><label>1Mトークン単価 (出力 $)</label><input type="number" id="apiOutput" step="0.0001" placeholder="0.30" required></div>
            <div class="form-group"><label>最低デポジット ($)</label><input type="number" id="minDeposit" step="0.01" value="0.00" required></div>
        </div>
        <div class="form-group"><label>料金に関する注意点 (Note)</label><textarea id="billingNote" placeholder="プロモーションにつき期間限定無料、等"></textarea></div>

        <h3 style="font-size:15px; margin-top:20px;">【特徴とタスク効率】</h3>
        <div class="form-group"><label>強み・特徴 (カンマ区切りで複数入力)</label><input type="text" id="strengths" placeholder="200万トークンの広大な窓, 圧倒的な低レイテンシ" required></div>
        <div class="row">
            <div class="form-group"><label>複雑な開発 (complex_development) の評価</label><textarea id="effComplex" placeholder="最高。複雑なエラー解析において高い突破力を持つ。" required></textarea></div>
            <div class="form-group"><label>単純作業 (simple_data_processing) の評価</label><textarea id="effSimple" placeholder="極めて高い。大量のデータ整形やパースにおいて最高クラス。" required></textarea></div>
        </div>

        <button type="button" onclick="generateJSON()">追記用JSONブロックを生成</button>
    </form>
</div>

<div class="card" id="resultCard" style="display:none;">
    <h2>生成されたJSON（末尾追記用）</h2>
    <p style="font-size:13px; color:#666;">既存の `data.json` の最後の要素の閉じカッコ <code>}</code> の後にカンマ <code>,</code> を入れて、以下を貼り付けてください。</p>
    <pre><code id="jsonOutput"></code></pre>
    <button class="copy-btn" onclick="copyToClipboard()">クリップボードにコピー</button>
</div>

<script>
function generateJSON() {
    const strengthsArray = document.getElementById('strengths').value.split(',').map(s => s.trim()).filter(s => s.length > 0);
    
    const data = {
        "id": document.getElementById('agentId').value,
        "name": document.getElementById('name').value,
        "interface": document.getElementById('interface').value,
        "category": document.getElementById('category').value,
        "url": document.getElementById('url').value,
        "billing": {
            "type": document.getElementById('billingType').value,
            "base_plan": document.getElementById('basePlan').value,
            "api_cost_per_1m_tokens": {
                "input": parseFloat(document.getElementById('apiInput').value),
                "output": parseFloat(document.getElementById('apiOutput').value)
            },
            "min_deposit_usd": parseFloat(document.getElementById('minDeposit').value),
            "note": document.getElementById('billingNote').value
        },
        "strengths": strengthsArray,
        "efficiency_by_task": {
            "complex_development": document.getElementById('effComplex').value,
            "simple_data_processing": document.getElementById('effSimple').value
        }
    };

    // フォーマットを既存のJSONのインデント（スペース4つ）に合わせ、先頭にもスペースを付与
    const jsonString = "    " + JSON.stringify(data, null, 4).replace(/\n/g, "\n    ");
    
    document.getElementById('jsonOutput').innerText = jsonString;
    document.getElementById('resultCard').style.display = 'block';
    window.scrollTo({ top: document.getElementById('resultCard').offsetTop, behavior: 'smooth' });
}

function copyToClipboard() {
    const text = document.getElementById('jsonOutput').innerText;
    navigator.clipboard.writeText(text).then(() => {
        alert('クリップボードにコピーしました！');
    }).catch(err => {
        alert('コピーに失敗しました: ' + err);
    });
}
</script>
</body>
</html>
